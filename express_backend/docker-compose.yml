version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ethiotutor_db
    environment:
      POSTGRES_USER:     ethiotutor
      POSTGRES_PASSWORD: ethiotutor_pass
      POSTGRES_DB:       ethiotutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethiotutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethiotutor_api
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://ethiotutor:ethiotutor_pass@postgres:5432/ethiotutor?schema=public"
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
